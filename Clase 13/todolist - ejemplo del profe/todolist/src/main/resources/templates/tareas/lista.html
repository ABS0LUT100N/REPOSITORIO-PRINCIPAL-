<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Tareas</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sonicBlue: '#005BFF',
                        sonicDark: '#000000',
                        sonicLight: '#00A2FF',
                        sonicYellow: '#FFE600',
                        sonicRed: '#FF1E1E',
                        sonicGreen: '#19FF71'
                    },

                    fontFamily: {
                        sonic: ['Arial Black', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body{
            overflow-x:hidden;
            position:relative;
        }

        /* Fondo estilo Sonic Generations */
        body::before{
            content:"";
            position:fixed;
            inset:0;
            background:
                radial-gradient(circle at top left, #005BFF 0 28%, transparent 29%),
                radial-gradient(circle at bottom right, #FF1E1E 0 30%, transparent 31%),
                linear-gradient(90deg,#005BFF 0 50%, #FF1E1E 50% 100%);
            z-index:-4;
        }

        /* Formas decorativas */
        body::after{
            content:"";
            position:fixed;
            inset:0;
            background:
                repeating-linear-gradient(
                    -45deg,
                    #FFE600 0 10px,
                    #000 10px 20px
                );
            clip-path: polygon(
                0 0,
                12% 0,
                8% 8%,
                20% 0,
                100% 0,
                100% 10%,
                92% 0,
                100% 100%,
                85% 100%,
                100% 85%,
                0 100%,
                0 85%,
                10% 100%,
                0 10%
            );
            opacity:.95;
            z-index:-3;
        }

        /* Overlay oscuro */
        .overlay{
            position:fixed;
            inset:0;
            background:
                radial-gradient(circle at center, transparent 0%, rgba(0,0,0,.25) 60%, rgba(0,0,0,.7) 100%);
            z-index:-2;
        }

        /* Título */
        .sonic-title{
            font-family:'Arial Black', sans-serif;
            text-transform:uppercase;
            text-shadow:
                4px 4px 0 black,
                0 0 12px rgba(255,255,255,.35);
            letter-spacing:2px;
        }

        /* Panel principal */
        .generations-panel{
            position:relative;
            background:#000;
            border:6px solid white;
            border-radius:2rem;
            overflow:hidden;
            box-shadow:
                0 0 0 6px #FFE600,
                0 0 40px rgba(0,0,0,.85);
        }

        .generations-panel::before{
            content:"";
            position:absolute;
            top:-45px;
            left:-45px;
            width:150px;
            height:150px;
            background:#005BFF;
            border-radius:999px;
            border:10px solid #FFE600;
        }

        .generations-panel::after{
            content:"";
            position:absolute;
            bottom:-60px;
            right:-60px;
            width:180px;
            height:180px;
            background:#FF1E1E;
            border-radius:999px;
            border:12px solid #FFE600;
        }

        /* Zig zag */
        .zigzag{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:18px;
            background:
                linear-gradient(-45deg, transparent 75%, #FFE600 75%) 0 0/18px 18px,
                linear-gradient(45deg, transparent 75%, #FFE600 75%) 0 0/18px 18px;
        }

        /* Tabla */
        .sonic-table th{
            background:#FFE600;
            color:black;
            font-family:'Arial Black', sans-serif;
            border-bottom:4px solid black;
        }

        .sonic-table td{
            border-bottom:2px solid rgba(255,255,255,.12);
        }

        .sonic-row{
            transition:.25s;
        }

        .sonic-row:hover{
            background:rgba(255,255,255,.08);
            transform:scale(1.01);
        }

        /* Botones */
        .sonic-btn{
            border-radius:999px;
            font-weight:900;
            letter-spacing:1px;
            border:4px solid black;
            transition:.2s;
            box-shadow:0 7px 0 rgba(0,0,0,.45);
        }

        .sonic-btn:hover{
            transform:translateY(3px) scale(1.03);
            box-shadow:0 3px 0 rgba(0,0,0,.45);
        }

        /* Estados */
        .status-complete{
            background:#19FF71 !important;
            color:black !important;
            border:3px solid black;
            font-weight:900;
            text-transform:uppercase;
            letter-spacing:1px;
        }

        .status-pending{
            background:#FFE600 !important;
            color:black !important;
            border:3px solid black;
            font-weight:900;
            text-transform:uppercase;
            letter-spacing:1px;
        }
    </style>
</head>

<body class="min-h-screen font-sans text-white">

    <div class="overlay"></div>

    <div th:replace="layouts/plantilla :: header"></div>

    <main class="px-6 py-10 max-w-7xl mx-auto">

        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-5">

            <h2 class="sonic-title text-5xl text-white">
                Lista de Tareas
            </h2>

            <!-- Botón nueva tarea -->
            <a th:href="@{/tareas/nueva}"
               class="sonic-btn bg-sonicYellow text-black px-8 py-4 text-xl">

                + NUEVA TAREA

            </a>

        </div>

        <!-- Tabla -->
        <div class="generations-panel p-6">

            <div class="zigzag"></div>

            <div class="overflow-x-auto relative z-10">

                <table class="sonic-table w-full text-left border-collapse">

                    <thead>

                        <tr>
                            <th class="px-6 py-5 text-lg">ID</th>
                            <th class="px-6 py-5 text-lg">DESCRIPCIÓN</th>
                            <th class="px-6 py-5 text-lg">CATEGORÍA</th>
                            <th class="px-6 py-5 text-lg">ESTADO</th>
                            <th class="px-6 py-5 text-lg text-center">ACCIONES</th>
                        </tr>

                    </thead>

                    <tbody>

                        <tr th:each="t : ${tareas}"
                            class="sonic-row">

                            <!-- ID -->
                            <td class="px-6 py-5 font-black text-yellow-300 text-lg"
                                th:text="${t.id}">
                            </td>

                            <!-- Descripción -->
                            <td class="px-6 py-5 font-semibold tracking-wide"
                                th:text="${t.descripcion}">
                            </td>

                            <!-- Categoría -->
                            <td class="px-6 py-5"
                                th:text="${t.categoria.nombre}">
                            </td>

                            <!-- Estado -->
                            <td class="px-6 py-5">

                                <span th:text="${t.completada ? 'Completada' : 'Pendiente'}"
                                      th:classappend="${t.completada} 
                                      ? 'status-complete' 
                                      : 'status-pending'"
                                      class="px-4 py-2 rounded-full text-sm shadow-md inline-block">
                                </span>

                            </td>

                            <!-- Acciones -->
                            <td class="px-6 py-5">

                                <div class="flex flex-wrap gap-3 justify-center">

                                    <!-- Editar -->
                                    <a th:href="@{'/tareas/editar/' + ${t.id}}"
                                       class="sonic-btn bg-sonicBlue hover:bg-blue-400 text-white px-5 py-2">

                                        EDITAR

                                    </a>

                                    <!-- Eliminar -->
                                    <a th:href="@{'/tareas/eliminar/' + ${t.id}}"
                                       onclick="return confirm('¿Eliminar esta tarea?')"
                                       class="sonic-btn bg-sonicRed hover:bg-red-400 text-white px-5 py-2">

                                        ELIMINAR

                                    </a>

                                    <!-- Completar -->
                                    <a th:href="@{'/tareas/completar/' + ${t.id}}"
                                       class="sonic-btn bg-sonicYellow hover:bg-white text-black px-5 py-2">

                                        COMPLETAR

                                    </a>

                                </div>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </main>

    <div th:replace="layouts/plantilla :: footer"></div>

</body>
</html>
